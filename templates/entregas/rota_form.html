{% extends 'base.html' %}
{% block title %}{{ titulo }}{% endblock %}
{% block nav_cad %}active{% endblock %}
{% block content %}
<div class="container py-4" style="max-width:500px">
    <div class="d-flex align-items-center gap-3 mb-4">
        <a href="{% url 'entregas:rota_lista' %}" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
        <h1 style="color:#fff;font-weight:700;font-size:1.4rem;margin:0">{{ titulo }}</h1>
    </div>
    <div class="card">
        <div class="card-body p-4">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nome da Rota *</label>
                    {{ form.nome }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Taxa de Entrega (R$) *</label>
                    {{ form.taxa_entrega }}
                    <div class="form-text" style="color:var(--muted)">Valor cobrado por pedido entregue nesta rota</div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Descrição</label>
                    {{ form.descricao }}
                </div>
                <div class="mb-4 form-check">
                    {{ form.ativa }}
                    <label class="form-check-label text-light ms-1">Rota ativa</label>
                </div>
                <button type="submit" class="btn btn-verm w-100">
                    <i class="bi bi-check-lg me-1"></i>Salvar
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
